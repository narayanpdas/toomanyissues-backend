version: '3.8'

services:
  # 1. The Postgres Database (For Orders & Inventory)

  postgres-db:
    image: postgres:latest
    container_name: ecom-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ecom_orders
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  # 2. The MongoDB Database (For Product Catalog)
  mongo-db:
    image: mongo:latest
    container_name: ecom-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  # 3. The Redis Cache (For Shopping Cart)
  redis-db:
    image: redis:latest
    container_name: ecom-redis
    ports:
      - "6379:6379"

# Volumes ensure your data survives even if you restart your computer
volumes:
  postgres-data:
  mongodata: